<text x="32.88" y="443.65" text-anchor="start" xml:space="preserve" font-family="&quot;思源黑体 CN Normal&quot;, sans-serif" font-size="16" fill="#FFFFFF"><tspan fill="#FFFFFF" font-size="16">新能源汽车电池技术研发取得进展，攻克了能量密度提升、快速充电、热管理等</tspan><tspan x="32.88" dy="24" fill="#FFFFFF" font-size="16">技术难题，提升了电池性能与安全性，为产品开发和商业化应用奠定了基础</tspan></text>
</g>
<g id="shape-7" data-name="小红书平北职场PPT5">
