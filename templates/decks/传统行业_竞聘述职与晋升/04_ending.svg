<g id="shape-82" data-name="文本框 81">
<rect x="736.06" y="148.01" width="494.27" height="55.1" fill="none" />
<text x="745.66" y="166.41" text-anchor="start" xml:space="preserve" font-family="Roboto, &quot;思源黑体 CN Normal&quot;, sans-serif" font-size="16" fill="#000000"><tspan fill="#000000" font-size="16">• </tspan><tspan fill="#000000" font-size="16">叠加功能带来的舒适体感，花样颜值提升可穿搭性，根据不同场</tspan><tspan x="745.66" dy="19.2" fill="#000000" font-size="16">景选择相应的搭配方案，是消费者购买多件防晒服的主要动因。</tspan></text>
</g>
<g id="shape-83" data-name="文本框 82">
<rect x="736.06" y="300.58" width="494.27" height="55.1" fill="none" />
<text x="745.66" y="318.98" text-anchor="start" xml:space="preserve" font-family="Roboto, &quot;思源黑体 CN Normal&quot;, sans-serif" font-size="16" fill="#000000"><tspan fill="#000000" font-size="16">• </tspan><tspan fill="#000000" font-size="16">被颜值吸引，不同款式</tspan><tspan fill="#000000" font-size="16">/</tspan><tspan fill="#000000" font-size="16">色系防晒衣可以搭配不同日常服饰。款式</tspan><tspan x="745.66" dy="19.2" fill="#000000" font-size="16">白搭，非常适合出行穿搭。</tspan></text>
</g>
<g id="shape-84" data-name="文本框 83">
<rect x="736.06" y="450.78" width="494.27" height="55.1" fill="none" />
<text x="745.66" y="469.18" text-anchor="start" xml:space="preserve" font-family="Roboto, &quot;思源黑体 CN Normal&quot;, sans-serif" font-size="16" fill="#000000"><tspan fill="#000000" font-size="16">• </tspan><tspan fill="#000000" font-size="16">针对不同防晒强度场景，选择不同防晒效果的防晒衣物。这样不</tspan><tspan x="745.66" dy="19.2" fill="#000000" font-size="16">用担心仅有一件衣物防晒不到位。</tspan></text>
</g>
<g id="shape-85" data-name="文本框 84">
<rect x="736.06" y="603.35" width="494.27" height="55.1" fill="none" />
<text x="745.66" y="621.75" text-anchor="start" xml:space="preserve" font-family="Roboto, &quot;思源黑体 CN Normal&quot;, sans-serif" font-size="16" fill="#000000"><tspan fill="#000000" font-size="16">• </tspan><tspan fill="#000000" font-size="16">担心反复清洗防晒效果打折，多件换着穿，不容易弄坏衣物，还</tspan><tspan x="745.66" dy="19.2" fill="#000000" font-size="16">能长时间保持衣物效果。</tspan></text>
</g>
